    body {

    /* 作者排版样式 */
    .author-block {

    .soft-shadow {

    .method-number-text {
      color: #3273dc;
      font-family: 'Google Sans', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      margin-right: 8px;
    }
    
    .metric-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
    }
    .metric-value {
      font-size: 2.2rem;
      font-weight: 800;
      color: #363636;
      line-height: 1.2;
    }
    .metric-label {
      font-size: 0.85rem;
      color: #7a7a7a;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 5px;
    }

    /* 文本高亮 */
    .directional-blue { color: #3273dc; font-weight: bold; }
    .invariant-black { color: #202020; font-weight: bold; }
